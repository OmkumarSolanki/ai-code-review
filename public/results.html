<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Results - AI Reviewer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <div class="container-wide">
    <div id="content">
      <div class="loader">
        <div class="spinner"></div>
        <p>Loading results...</p>
      </div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = renderNavbar();
    document.getElementById('footer').innerHTML = renderFooter();

    const reviewId = new URLSearchParams(window.location.search).get('id');
    if (!reviewId) { window.location.href = '/dashboard.html'; throw new Error('no id'); }

    async function loadResults() {
      try {
        const review = await apiFetch(`/reviews/${reviewId}`);
        if (!review) return;
        renderResults(review);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="alert alert-error" style="margin-top:40px">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderResults(review) {
      const totalFindings = review.files.reduce((s, f) => s + f.findings.length, 0);
      const criticalCount = review.files.reduce((s, f) => s + f.findings.filter(fi => fi.severity === 'critical').length, 0);
      const warningCount = review.files.reduce((s, f) => s + f.findings.filter(fi => fi.severity === 'warning').length, 0);
      const infoCount = review.files.reduce((s, f) => s + f.findings.filter(fi => fi.severity === 'info').length, 0);
      const score = review.projectScore;
      const sClass = score != null ? scoreClass(score) : '';

      let html = `
        <div class="page-header">
          <h1>Review Results</h1>
          <div style="display:flex;align-items:center;gap:16px;">
            <span class="badge badge-${review.status === 'COMPLETED' ? 'success' : 'critical'}">${review.status}</span>
            <span style="color:var(--text-muted);font-size:13px;">${timeAgo(review.createdAt)}</span>
          </div>
        </div>

        <!-- Summary Cards -->
        <div class="results-summary">
          ${score != null ? `
          <div class="stat-card">
            <div class="stat-value" style="color: var(--${score >= 80 ? 'success' : score >= 50 ? 'warning' : 'critical'})">${score}</div>
            <div class="stat-label">Health Score</div>
          </div>
          ` : ''}
          <div class="stat-card">
            <div class="stat-value">${review.files.length}</div>
            <div class="stat-label">Files Analyzed</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: var(--critical)">${criticalCount}</div>
            <div class="stat-label">Critical Issues</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: var(--warning)">${warningCount}</div>
            <div class="stat-label">Warnings</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: var(--info)">${infoCount}</div>
            <div class="stat-label">Info</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totalFindings}</div>
            <div class="stat-label">Total Findings</div>
          </div>
        </div>
      `;

      if (totalFindings === 0) {
        html += `
          <div class="empty-state" style="margin-top:20px">
            <h3>No issues found!</h3>
            <p>Your code looks clean. Great job!</p>
          </div>
        `;
      }

      // Render each file
      for (const file of review.files) {
        const fileScore = file.healthScore;
        const fClass = fileScore != null ? scoreClass(fileScore) : '';
        const findingCount = file.findings.length;

        html += `
          <div class="file-section">
            <div class="file-header" onclick="this.parentElement.querySelector('.file-findings').classList.toggle('collapsed')">
              <h3>${escapeHtml(file.filename)}</h3>
              <div class="file-header-right">
                <span style="font-size:12px;color:var(--text-muted)">${file.language} &middot; ${file.linesOfCode} lines</span>
                ${findingCount > 0 ? `<span class="badge badge-warning">${findingCount} issue${findingCount === 1 ? '' : 's'}</span>` : '<span class="badge badge-success">Clean</span>'}
                ${fileScore != null ? `<div class="score-circle score-small ${fClass}">${fileScore}</div>` : ''}
              </div>
            </div>
            <div class="file-findings">
        `;

        // Sort: critical first
        const sorted = [...file.findings].sort((a, b) => {
          const rank = { critical: 3, warning: 2, info: 1 };
          return (rank[b.severity] || 0) - (rank[a.severity] || 0);
        });

        for (const finding of sorted) {
          html += `
            <div class="finding finding-${finding.severity}">
              <div class="finding-header">
                ${severityBadge(finding.severity)}
                <span class="badge badge-info" style="font-size:10px">${escapeHtml(finding.category)}</span>
                <span class="finding-line">Line ${finding.lineStart}${finding.lineEnd !== finding.lineStart ? '-' + finding.lineEnd : ''}</span>
                <span class="finding-source">${escapeHtml(finding.source)}</span>
              </div>
              <div class="finding-message">${escapeHtml(finding.message)}</div>
              ${finding.codeSnippet ? `<div class="code-block">${escapeHtml(finding.codeSnippet)}</div>` : ''}
              ${finding.suggestedFix ? `
                <details class="suggested-fix">
                  <summary>View Suggested Fix ${finding.fixStatus === 'verified' ? '<span class="badge badge-success" style="margin-left:6px;font-size:10px">Verified</span>' : ''}</summary>
                  <div class="code-block">${escapeHtml(finding.suggestedFix)}</div>
                </details>
              ` : ''}
            </div>
          `;
        }

        html += `</div></div>`;
      }

      html += `
        <div style="margin: 32px 0; display: flex; gap: 12px;">
          <a href="/review.html" class="btn btn-primary">New Review</a>
          <a href="/dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    loadResults();
  </script>
</body>
</html>
