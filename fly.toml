# fly.toml app configuration file generated for om-solanki-ai-code-review on 2026-04-02T20:39:43-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-code-review'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:./prod.db'
  LLM_BATCH_TOKEN_BUDGET = '12000'
  LLM_CONCURRENCY_LIMIT = '5'
  LLM_MAX_RETRIES = '3'
  LLM_PROVIDER = 'demo'
  MAX_FILES_PER_REVIEW = '100'
  MAX_FILE_SIZE_MB = '5'
  MAX_TOTAL_SIZE_MB = '20'
  PORT = '4000'
  NODE_OPTIONS = "--max-old-space-size=200"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
  swap_size_mb = 256


